<div style="margin:0;background:#f7f7f4;padding:32px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#18181b;">
  <div style="max-width:560px;margin:0 auto;background:#ffffff;border:1px solid #deded7;border-radius:12px;overflow:hidden;">
    <div style="padding:28px 28px 18px;border-bottom:1px solid #deded7;background:#fbfbf8;">
      <div style="font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#256f5b;">Formlet</div>
      <h1 style="margin:14px 0 0;font-size:24px;line-height:1.35;color:#18181b;">ログインリンクを送信しました</h1>
    </div>
    <div style="padding:28px;">
      <p style="margin:0 0 18px;font-size:15px;line-height:1.8;color:#3f3f46;">以下のボタンからFormletにログインできます。</p>
      <p style="margin:28px 0;">
        <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#18181b;color:#ffffff;text-decoration:none;border-radius:8px;padding:13px 18px;font-size:14px;font-weight:700;">ログインする</a>
      </p>
      <p style="margin:0 0 16px;font-size:13px;line-height:1.7;color:#71717a;">ワンタイムコードを求められた場合は、以下を入力してください。</p>
      <p style="margin:0 0 18px;font-size:28px;letter-spacing:.18em;font-weight:800;color:#18181b;">{{ .Token }}</p>
      <p style="margin:0;padding:12px;background:#f7f7f4;border:1px solid #deded7;border-radius:8px;word-break:break-all;font-size:12px;line-height:1.6;color:#52525b;">{{ .ConfirmationURL }}</p>
    </div>
  </div>
</div>
